[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # VITE_ADMIN_CODE is a client-side unlock PIN that Vite inlines into the
  # browser bundle at build time — it is not a server secret and must be
  # present in the output for the admin gate to work. Exclude it from
  # Netlify's secrets scanner so the build isn't blocked.
  SECRETS_SCAN_OMIT_KEYS = "VITE_ADMIN_CODE"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
