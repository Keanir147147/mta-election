<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTA Co-President Election 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', system-ui, sans-serif; }
      @keyframes mtaFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes mtaSlideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      .mta-fade { animation: mtaFadeIn 0.35s ease-out both; }
      .mta-slide { animation: mtaSlideUp 0.4s ease-out both; }
      .mta-d1 { animation-delay: 0.05s; } .mta-d2 { animation-delay: 0.1s; }
      .mta-d3 { animation-delay: 0.15s; } .mta-d4 { animation-delay: 0.2s; }
      .mta-d5 { animation-delay: 0.25s; } .mta-d6 { animation-delay: 0.3s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
